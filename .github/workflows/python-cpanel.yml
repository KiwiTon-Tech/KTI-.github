name: Python service (cPanel)

on:
  workflow_call:
    inputs:
      app_path:
        description: "Absolute path on the cPanel server (e.g. /home/user/apps/broker-service)"
        required: true
        type: string
      python_version:
        description: "Python version on the cPanel server (must match the app's virtualenv)"
        required: false
        type: string
        default: "3.11"
      passenger_app:
        description: "If true, run `touch tmp/restart.txt` after deploy"
        required: false
        type: boolean
        default: true
      run_tests:
        description: "Run pytest before deploying"
        required: false
        type: boolean
        default: true
      sync_env:
        description: "If true, write DOTENV_CONTENT secret to <app_path>/.env on the server (mode 600). Use to rotate secrets."
        required: false
        type: boolean
        default: false
    secrets:
      CPANEL_HOST:
        required: true
      CPANEL_USER:
        required: true
      CPANEL_SSH_KEY:
        required: true
      DOTENV_CONTENT:
        description: "Full body of the service's .env file. Required only when sync_env=true."
        required: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          if [ -d tests ] || [ -d test ]; then
            pip install pytest
            pytest -q
          else
            echo "No tests directory found — skipping."
          fi

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.app_path }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Add cPanel host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync project to cPanel
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude 'tests' \
            --exclude 'node_modules' \
            ./ ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:${{ inputs.app_path }}/

      - name: Sync .env to server
        if: ${{ inputs.sync_env }}
        env:
          DOTENV_CONTENT: ${{ secrets.DOTENV_CONTENT }}
        run: |
          if [ -z "$DOTENV_CONTENT" ]; then
            echo "::error::sync_env=true but DOTENV_CONTENT secret is empty."
            exit 1
          fi
          # Write locally, then SCP atomically and chmod 600.
          umask 077
          printf '%s\n' "$DOTENV_CONTENT" > .env.deploy
          scp -o StrictHostKeyChecking=yes .env.deploy \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:${{ inputs.app_path }}/.env.new
          ssh ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} bash -lc "'
            set -e
            cd ${{ inputs.app_path }}
            chmod 600 .env.new
            if [ -f .env ]; then cp -p .env .env.bak.\$(date +%Y%m%d%H%M%S); fi
            mv .env.new .env
          '"
          rm -f .env.deploy

      - name: Install dependencies on server
        run: |
          ssh ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} bash -lc "'
            set -e
            cd ${{ inputs.app_path }}
            VENV=\$(ls -d \$HOME/virtualenv${{ inputs.app_path }}/${{ inputs.python_version }} 2>/dev/null | head -n 1)
            if [ -z \"\$VENV\" ]; then
              echo \"No virtualenv found for ${{ inputs.app_path }} at \$HOME/virtualenv${{ inputs.app_path }}/${{ inputs.python_version }}\"
              echo \"Create the Python App in cPanel first.\"
              exit 1
            fi
            source \"\$VENV/bin/activate\"
            pip install --upgrade pip
            pip install -r requirements.txt
          '"

      - name: Restart Passenger
        if: ${{ inputs.passenger_app }}
        run: |
          ssh ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "mkdir -p ${{ inputs.app_path }}/tmp && touch ${{ inputs.app_path }}/tmp/restart.txt"
